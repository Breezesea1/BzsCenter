name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: "22"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  E2E_SMOKE_FILTER: Category=Smoke
  E2E_STARTUP_FILTER: Category=Startup

jobs:
  build-test:
    name: Build, format, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/BzsOIDC.Idp/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BzsOIDC.Idp

      - name: Restore solution
        run: dotnet restore BzsOIDC.sln

      - name: Build solution
        run: dotnet build BzsOIDC.sln -c Release --no-restore

      - name: Verify formatting
        run: dotnet format BzsOIDC.sln --verify-no-changes --verbosity minimal

      - name: Run unit tests
        run: dotnet test tests/BzsOIDC.Idp.UnitTests/BzsOIDC.Idp.UnitTests.csproj -c Release --no-build --logger "trx;LogFileName=unit-tests.trx"

      - name: Run integration tests
        run: dotnet test tests/BzsOIDC.Idp.IntegrationTests/BzsOIDC.Idp.IntegrationTests.csproj -c Release --no-build --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload .NET test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: |
            tests/BzsOIDC.Idp.UnitTests/TestResults/**/*.trx
            tests/BzsOIDC.Idp.IntegrationTests/TestResults/**/*.trx

      - name: Upload Release build outputs for E2E jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-build-outputs
          include-hidden-files: true
          path: |
            src/**/bin/Release/**
            src/**/obj/Release/**
            tests/**/bin/Release/**
            tests/**/obj/Release/**

  e2e-smoke:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 45
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Release build outputs
        uses: actions/download-artifact@v4
        with:
          name: release-build-outputs
          path: .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/BzsOIDC.Idp.E2ETests/BzsOIDC.Idp.E2ETests.csproj') }}

      - name: Install Playwright browsers
        run: pwsh tests/BzsOIDC.Idp.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run E2E smoke tests
        env:
          CI: true
          TESTING__SMOKE__ENABLED: true
        run: dotnet test tests/BzsOIDC.Idp.E2ETests/BzsOIDC.Idp.E2ETests.csproj -c Release --no-build --filter "${{ env.E2E_SMOKE_FILTER }}" --logger "trx;LogFileName=e2e-smoke-tests.trx"

      - name: Upload E2E smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-test-results
          path: |
            tests/BzsOIDC.Idp.E2ETests/TestResults/**/*.trx
            test-results/**

  app-startup:
    name: Application startup smoke
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Release build outputs
        uses: actions/download-artifact@v4
        with:
          name: release-build-outputs
          path: .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/BzsOIDC.Idp.E2ETests/BzsOIDC.Idp.E2ETests.csproj') }}

      - name: Install Playwright browsers
        run: pwsh tests/BzsOIDC.Idp.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run application startup smoke test
        env:
          CI: true
          TESTING__SMOKE__ENABLED: true
        run: dotnet test tests/BzsOIDC.Idp.E2ETests/BzsOIDC.Idp.E2ETests.csproj -c Release --no-build --filter "${{ env.E2E_STARTUP_FILTER }}" --logger "trx;LogFileName=app-startup-tests.trx"

      - name: Upload application startup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-startup-test-results
          path: |
            tests/BzsOIDC.Idp.E2ETests/TestResults/**/*.trx
            test-results/**

  e2e-full:
    name: Full E2E suite
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Release build outputs
        uses: actions/download-artifact@v4
        with:
          name: release-build-outputs
          path: .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/BzsOIDC.Idp.E2ETests/BzsOIDC.Idp.E2ETests.csproj') }}

      - name: Install Playwright browsers
        run: pwsh tests/BzsOIDC.Idp.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run full E2E tests
        env:
          CI: true
        run: dotnet test tests/BzsOIDC.Idp.E2ETests/BzsOIDC.Idp.E2ETests.csproj -c Release --no-build --logger "trx;LogFileName=e2e-tests.trx"

      - name: Upload full E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/BzsOIDC.Idp.E2ETests/TestResults/**/*.trx
            test-results/**

  container-images:
    name: Build container images
    runs-on: ubuntu-latest
    needs:
      - build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: image-metadata
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          idp_sha="ghcr.io/${owner}/bzsoidc-idp:sha-${GITHUB_SHA}"
          migrator_sha="ghcr.io/${owner}/bzsoidc-idp-migrator:sha-${GITHUB_SHA}"

          echo "publish=false" >> "$GITHUB_OUTPUT"
          echo "idp_tags=${idp_sha}" >> "$GITHUB_OUTPUT"
          echo "migrator_tags=${migrator_sha}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "idp_tags=${idp_sha},ghcr.io/${owner}/bzsoidc-idp:latest" >> "$GITHUB_OUTPUT"
            echo "migrator_tags=${migrator_sha},ghcr.io/${owner}/bzsoidc-idp-migrator:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.image-metadata.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build IDP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BzsOIDC.Idp/Dockerfile
          push: ${{ steps.image-metadata.outputs.publish == 'true' }}
          tags: ${{ steps.image-metadata.outputs.idp_tags }}
          provenance: false

      - name: Build migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BzsOIDC.Idp.Migrator/Dockerfile
          push: ${{ steps.image-metadata.outputs.publish == 'true' }}
          tags: ${{ steps.image-metadata.outputs.migrator_tags }}
          provenance: false

      - name: Summarize image output
        shell: bash
        run: |
          {
            echo "## Container images"
            echo
            echo "- IDP tags: ${{ steps.image-metadata.outputs.idp_tags }}"
            echo "- Migrator tags: ${{ steps.image-metadata.outputs.migrator_tags }}"
            echo
            if [[ "${{ steps.image-metadata.outputs.publish }}" == "true" ]]; then
              echo "Published to GHCR from main push."
              echo "Packages usually appear under https://github.com/users/${GITHUB_REPOSITORY_OWNER}/packages or the organization packages page."
            else
              echo "Built for validation only. This run did not push images because it was not a push to main."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

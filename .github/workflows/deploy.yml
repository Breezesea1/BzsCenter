name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (for example latest or sha-<commit>)
        required: false
        default: latest
      deploy_path:
        description: Remote deployment directory
        required: false
        default: /opt/bzscenter

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout workflow-run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Resolve deployment variables
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            echo "image_tag=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/opt/bzscenter" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "deploy_path=${{ inputs.deploy_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        shell: bash
        run: |
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY GHCR_PAT PROD_ENV_FILE; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Prepare SSH key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT:-22}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment assets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        shell: bash
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          printf '%s' "${PROD_ENV_FILE}" > production.env
          scp -P "${SSH_PORT:-22}" deploy/docker-compose.yml deploy/deploy.sh production.env "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
          rm -f production.env
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "cd '${DEPLOY_PATH}' && mv production.env .env && chmod +x deploy.sh"

      - name: Run remote deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        shell: bash
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && GHCR_USERNAME='${GHCR_USERNAME}' GHCR_PAT='${GHCR_PAT}' GHCR_IMAGE_PREFIX='${GHCR_IMAGE_PREFIX}' IMAGE_TAG='${IMAGE_TAG}' DEPLOY_PATH='${DEPLOY_PATH}' bash ./deploy.sh"

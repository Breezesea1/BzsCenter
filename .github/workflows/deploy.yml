name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (for example latest or sha-<commit>)
        required: false
        default: latest
      deploy_path:
        description: Remote deployment directory
        required: false
        default: /opt/bzscenter

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check deployment configuration
        id: deploy-config
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        shell: bash
        run: |
          missing=()

          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY GHCR_PAT PROD_ENV_FILE; do
            if [[ -z "${!name}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Deployment skipped"
              echo
              echo "Required deployment secrets are not configured for this repository/environment."
              echo
              for name in "${missing[@]}"; do
                echo "- Missing secret: `${name}`"
              done
              echo
              echo "Set the deploy secrets and rerun this workflow when you are ready to deploy."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Deployment enabled"
              echo
              echo "All required deployment secrets are configured."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout workflow-run commit
        if: github.event_name == 'workflow_run' && steps.deploy-config.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current ref
        if: github.event_name == 'workflow_dispatch' && steps.deploy-config.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Resolve deployment variables
        if: steps.deploy-config.outputs.configured == 'true'
        id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr_image_prefix=ghcr.io/${owner}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            echo "image_tag=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/opt/bzscenter" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "deploy_path=${{ inputs.deploy_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH key
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT:-22}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment assets
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        shell: bash
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          printf '%s' "${PROD_ENV_FILE}" > production.env
          scp -P "${SSH_PORT:-22}" deploy/docker-compose.yml deploy/deploy.sh production.env "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
          rm -f production.env
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "cd '${DEPLOY_PATH}' && mv production.env .env && chmod +x deploy.sh"

      - name: Run remote deployment
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_IMAGE_PREFIX: ${{ steps.vars.outputs.ghcr_image_prefix }}
        shell: bash
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && GHCR_USERNAME='${GHCR_USERNAME}' GHCR_PAT='${GHCR_PAT}' GHCR_IMAGE_PREFIX='${GHCR_IMAGE_PREFIX}' IMAGE_TAG='${IMAGE_TAG}' DEPLOY_PATH='${DEPLOY_PATH}' bash ./deploy.sh"
